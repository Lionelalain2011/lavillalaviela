<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>La Villa la vie là Ltd | Mauritius</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
    header { position: relative; text-align: center; color: white; background: #000; overflow: hidden; height: 400px; }
    header img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
    header .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; }
    header h1 { font-size: clamp(24px, 5vw, 48px); margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    header p { font-size: 1.2rem; margin-top: 10px; }
    section { padding: 40px 20px; max-width: 1200px; margin: auto; }
    h2 { border-bottom: 2px solid #0B2C5D; padding-bottom: 10px; color: #0B2C5D; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    footer { text-align: center; padding: 30px; background: #0B2C5D; color: white; margin-top: 20px; }
</style>
</head>
<body>

<header>
    <img src="villa3.jpeg.jpg" alt="La Villa la vie là">
    <div class="overlay">
        <h1>La Villa la vie là Ltd</h1>
        <p>Luxury Accommodation in Mauritius</p>
    </div>
</header>

<section>
    <h2>About the Villa</h2>
    <p>La Villa la vie là is a peaceful sanctuary in the heart of Mauritius. Enjoy modern amenities, a private pool, and beautiful tropical views.</p>
</section>

<section>
    <h2>Gallery</h2>
    <div class="gallery" id="gallery"></div>
</section>

<footer>
    <p>© 2026 La Villa la vie là Ltd</p>
</footer>

<script>
    // These names now match your GitHub file list EXACTLY (no spaces)
    const images = [
        "villa1.jpeg.jpg",
        "villa2.jpeg.jpg",
        "villa3.jpeg.jpg",
        "villa4.jpeg.jpg",
        "villa5.jpeg.jpg",
        "villa6.jpeg.jpg",
        "villa7.jpeg.jpg",
        "villa8.jpeg.jpeg", 
        "villa9.jpeg.jpg",
        "villa10.jpeg.jpg"
    ];

    const gallery = document.getElementById("gallery");

    images.forEach(imgFile => {
        const img = document.createElement("img");
        img.src = imgFile;
        img.alt = "Villa Photo";
        img.onerror = function() { console.error("Failed to load: " + imgFile); };
        gallery.appendChild(img);
    });
</script>
</body>
</html>
