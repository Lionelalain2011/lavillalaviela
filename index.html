<script>
    // These names now match your GitHub files exactly (NO SPACES)
    const images = [
        "villa1.jpeg.jpg",
        "villa2.jpeg.jpg",
        "villa3.jpeg.jpg",
        "villa4.jpeg.jpg",
        "villa5.jpeg.jpg",
        "villa6.jpeg.jpg",
        "villa7.jpeg.jpg",
        "villa8.jpeg.jpeg", 
        "villa9.jpeg.jpg",
        "villa10.jpeg.jpg"
    ];

    const gallery = document.getElementById("gallery");

    images.forEach(imgFile => {
        const img = document.createElement("img");
        img.src = imgFile;
        img.alt = "Villa Photo";
        // This ensures the images look nice even if they are different sizes
        img.style.width = "100%";
        img.style.height = "250px";
        img.style.objectFit = "cover";
        img.style.borderRadius = "8px";
        gallery.appendChild(img);
    });
</script>
