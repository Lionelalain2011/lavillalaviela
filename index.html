<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Villa la vie là Ltd - Mauritius</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --luxury-blue: #1a2a44; /* Deep Navy Blue */
            --gold: #c5a059;       /* Elegant Gold */
            --light-gold: #f4e9d5;
        }

        body { font-family: 'Georgia', serif; margin: 0; padding: 0; background-color: #fdfdfd; color: var(--luxury-blue); line-height: 1.6; text-align: center; }
        
        header { 
            background: linear-gradient(rgba(26, 42, 68, 0.8), rgba(26, 42, 68, 0.8)), url('villa1.jpg'); 
            background-size: cover; 
            background-position: center; 
            color: var(--gold); 
            padding: 100px 20px; 
            border-bottom: 5px solid var(--gold);
        }
        
        h1 { margin: 0; font-size: 3em; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }
        h2 { color: var(--luxury-blue); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }

        .container { width: 90%; max-width: 1100px; margin: -50px auto 30px; background: white; padding: 40px; border-radius: 5px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid var(--light-gold); }

        /* Features Section - Now Blue and Gold */
        .features { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
        .feature-item { 
            background: var(--luxury-blue); 
            color: var(--gold); 
            padding: 15px 25px; 
            border-radius: 0; 
            border: 1px solid var(--gold);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .booking-section { background: var(--light-gold); padding: 30px; border-radius: 5px; margin: 30px 0; border: 1px solid var(--gold); }
        
        .calendar-input { 
            padding: 15px; 
            border: 1px solid var(--luxury-blue); 
            border-radius: 0; 
            font-size: 16px; 
            width: 280px; 
            text-align: center;
            margin-bottom: 10px;
        }
        
        /* Kept WhatsApp Green for recognition, but with a gold border */
        .btn-whatsapp { 
            background-color: #25D366; 
            color: white; 
            padding: 18px 40px; 
            border-radius: 5px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1em; 
            display: inline-block;
            border: 2px solid var(--gold);
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background-color: #128C7E; transform: translateY(-3px); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border: 2px solid var(--light-gold);
            transition: 0.4s;
        }
        .gallery img:hover { border-color: var(--gold); }

        footer { background: var(--luxury-blue); color: var(--gold); padding: 50px 20px; margin-top: 60px; }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .container { padding: 20px; width: 95%; }
        }
    </style>
</head>
<body>

    <p style="color: white; letter-spacing: 2px;">EXCLUSIVE LUXURY ACCOMMODATION</p>
</header>

        <div class="feature-item">🏊 Private Pool</div>
    </div>
