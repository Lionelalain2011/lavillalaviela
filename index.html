<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Villa la vie là Ltd</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #1a252f;
            color: white;
            padding: 40px 20px;
        }
        .container {
            width: 95%;
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5em; }
        .intro-text { font-size: 1.2em; color: #555; margin-bottom: 30px; }
        
        /* The Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            background: #eee;
            height: 250px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        footer {
            margin-top: 50px;
            padding: 30px;
            background: #1a252f;
            color: white;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .container
